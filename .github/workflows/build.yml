name: Build Plugin

on:
  workflow_call:
  workflow_run:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn --batch-mode package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BundleFixer
          path: target/*.jar